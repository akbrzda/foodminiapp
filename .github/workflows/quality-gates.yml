name: Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  quality:
    name: Lint Typecheck Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (backend)
        working-directory: backend
        run: npm ci

      - name: Install dependencies (admin-panel)
        working-directory: admin-panel
        run: npm ci

      - name: Install dependencies (telegram-miniapp)
        working-directory: telegram-miniapp
        run: npm ci

      - name: Install dependencies (bot)
        working-directory: bot
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run test
        run: npm run test
