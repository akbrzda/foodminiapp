name: Deploy Backend
on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
jobs:
  quality:
    name: Backend Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Run lint
        working-directory: backend
        run: npm run lint
      - name: Run typecheck
        working-directory: backend
        run: npm run typecheck
      - name: Run tests
        working-directory: backend
        run: npm run test
      - name: Security audit
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

  deploy:
    name: Deploy Backend to Server
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci --production
      - name: Create .env file
        working-directory: backend
        run: |
          cat << EOF > .env
          NODE_ENV=${{ secrets.NODE_ENV }}
          PORT=${{ secrets.PORT }}
          WORKERS_MODE=external
          TRUST_PROXY=${{ secrets.TRUST_PROXY }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          ADMIN_REFRESH_SESSION_HOURS=${{ secrets.ADMIN_REFRESH_SESSION_HOURS }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MINIAPP_URL=${{ secrets.TELEGRAM_MINIAPP_URL }}
          BOT_SERVICE_URL=${{ secrets.BOT_SERVICE_URL }}
          BOT_SERVICE_TOKEN=${{ secrets.BOT_SERVICE_TOKEN }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          AUTH_COOKIE_SECURE=${{ secrets.AUTH_COOKIE_SECURE }}
          AUTH_COOKIE_SAMESITE=${{ secrets.AUTH_COOKIE_SAMESITE }}
          CDN_BASE_URL=${{ secrets.CDN_BASE_URL }}
          CDN_IMAGES_PATH=${{ secrets.CDN_IMAGES_PATH }}
          BROADCAST_WORKER_ENABLED=${{ secrets.BROADCAST_WORKER_ENABLED }}
          BROADCAST_WORKER_BATCH_SIZE=${{ secrets.BROADCAST_WORKER_BATCH_SIZE }}
          BROADCAST_WORKER_INTERVAL_MS=${{ secrets.BROADCAST_WORKER_INTERVAL_MS }}
          BROADCAST_RATE_LIMIT=${{ secrets.BROADCAST_RATE_LIMIT }}
          BROADCAST_RETRY_MAX=${{ secrets.BROADCAST_RETRY_MAX }}
          BROADCAST_RETRY_DELAYS=${{ secrets.BROADCAST_RETRY_DELAYS }}
          BROADCAST_CONVERSION_WINDOW_DAYS=${{ secrets.BROADCAST_CONVERSION_WINDOW_DAYS }}
          BROADCAST_WS_STATS_EVERY=${{ secrets.BROADCAST_WS_STATS_EVERY }}
          BROADCAST_WS_STATS_FAIL_EVERY=${{ secrets.BROADCAST_WS_STATS_FAIL_EVERY }}
          EOF
      - name: Setup SSH
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "ERROR: SSH_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "ERROR: SSH_USER secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          echo "SSH setup completed successfully"
      - name: Deploy to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'logs' \
            --exclude 'bot' \
            backend/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/backend.panda.akbrzda.ru/
      - name: Install dependencies on server
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/backend.panda.akbrzda.ru
            npm ci --production
      - name: Run database migrations
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/backend.panda.akbrzda.ru
            npm run migrate
      - name: Restart application with PM2
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/backend.panda.akbrzda.ru
            pm2 describe foodminiapp-backend > /dev/null
            if [ $? -eq 0 ]; then
              pm2 restart foodminiapp-backend
            else
              pm2 start src/index.js --name foodminiapp-backend
              pm2 save
            fi
            pm2 describe foodminiapp-workers > /dev/null
            if [ $? -eq 0 ]; then
              pm2 restart foodminiapp-workers
            else
              pm2 start npm --name foodminiapp-workers -- run worker
              pm2 save
            fi
      - name: Check application status
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            pm2 status foodminiapp-backend
            pm2 logs foodminiapp-backend --lines 50 --nostream
