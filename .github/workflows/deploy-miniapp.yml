name: Deploy MiniApp
on:
  push:
    branches:
      - main
    paths:
      - "telegram-miniapp/**"
      - ".github/workflows/deploy-miniapp.yml"
jobs:
  quality:
    name: MiniApp Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: telegram-miniapp/package-lock.json
      - name: Install dependencies
        working-directory: telegram-miniapp
        run: npm ci
      - name: Run lint
        working-directory: telegram-miniapp
        run: npm run lint
      - name: Run typecheck
        working-directory: telegram-miniapp
        run: npm run typecheck
      - name: Run tests
        working-directory: telegram-miniapp
        run: npm run test
      - name: Security audit
        working-directory: telegram-miniapp
        run: npm audit --omit=dev --audit-level=high

  deploy:
    name: Deploy MiniApp to Server
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: telegram-miniapp/package-lock.json
      - name: Install dependencies
        working-directory: telegram-miniapp
        run: npm ci
      - name: Create .env file
        working-directory: telegram-miniapp
        run: |
          cat << EOF > .env
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_WS_URL=${{ secrets.VITE_WS_URL }}
          VITE_UPLOADS_URL=${{ secrets.VITE_UPLOADS_URL }}
          EOF
      - name: Build application
        working-directory: telegram-miniapp
        run: npm run build
      - name: Setup SSH
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "ERROR: SSH_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "ERROR: SSH_USER secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          echo "SSH setup completed successfully"
      - name: Deploy to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            telegram-miniapp/dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/app.panda.akbrzda.ru/
      - name: Verify deployment
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ls -la /var/www/app.panda.akbrzda.ru
            echo "Deployment completed successfully"
